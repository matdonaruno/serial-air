[build]
  publish = "docs"

# Default (Glass)
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# LP Glass (Glassmorphism / Orange)
[[redirects]]
  from = "/lp_glass"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/lp_glass/codegen"
  to = "/codegen.html"
  status = 200

# LP Dark (Tailwind / Dark Terminal)
[[redirects]]
  from = "/lp_dark"
  to = "/lp.html"
  status = 200

[[redirects]]
  from = "/lp_dark/codegen"
  to = "/lp-codegen.html"
  status = 200

# Shared pages
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/codegen"
  to = "/codegen.html"
  status = 200
